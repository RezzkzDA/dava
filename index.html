<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dava Tanarja</title>
  <style>
    /* Font dan animasi dasar */
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      color: white;
      overflow-x: hidden;
      animation: fadeIn 2s ease-in;
      background: url('https://i.imgur.com/g4VC09j.jpeg') no-repeat center center fixed;
      background-size: cover;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    header {
      text-align: center;
      padding: 100px 20px 40px;
      background: rgba(0, 0, 0, 0.5);
    }

    header h1 {
      font-size: 3em;
      margin: 0;
      animation: slideDown 1.5s ease-out;
    }

    header p {
      font-size: 1.2em;
      margin-top: 10px;
      animation: fadeIn 2.5s ease-in;
    }

    @keyframes slideDown {
      from { transform: translateY(-50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    section {
      padding: 60px 20px;
      background: rgba(0, 0, 0, 0.6);
      margin: 20px;
      border-radius: 10px;
      animation: floatUp 2s ease-in-out;
    }

    @keyframes floatUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      margin: 20px auto;
      max-width: 600px;
      border-radius: 10px;
      backdrop-filter: blur(5px);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 30px;
      font-size: 0.9em;
      background: rgba(0, 0, 0, 0.5);
    }

    /* Animasi bintang */
    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      animation: twinkle 3s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="stars">
    <!-- Generate bintang secara acak -->
    <script>
      for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.top = Math.random() * 100 + '%';
        star.style.left = Math.random() * 100 + '%';
        star.style.animationDuration = (Math.random() * 3 + 2) + 's';
        document.querySelector('.stars').appendChild(star);
      }
    </script>
  </div>

  <header>
    <h1>Dava Tanarja</h1>
    <p>Editor | Content Creator ✨</p>
  </header>

  <section>
    <div class="card">
      <h2>Tentang Saya</h2>
      <p>Saya hanyalah manusia biasa yang suka bermain game.</p>
    </div>
    <div class="card">
      <h2>Hobi</h2>
      <ul>
        <li>Photography 📸</li>
        <li>Video Editing 🎥</li>
        <li>Bermain Game 🎮</li>
      </ul>
    </div>
    <div class="card">
      <h2>Kontak Saya</h2>
      <p>Email : davatanarja99@gmail.com<br>
         Instagram : @davatanarjaa</p>
      <p>YouTube : DavDava - 320+ Subscriber<br>
    </div>
  </section>

  <footer>
    &copy; dav 💫
  </footer>
</body>
</html>
